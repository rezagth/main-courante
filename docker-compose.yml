version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: main-courante-db
    environment:
      POSTGRES_DB: main_courante
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - main-courante-network

  redis:
    image: redis:7-alpine
    container_name: main-courante-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - main-courante-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: main-courante-app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/main_courante
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: dev-secret-change-in-production
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - main-courante-network
    command: pnpm dev

  # Optional: pgAdmin for database inspection
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: main-courante-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - main-courante-network

volumes:
  postgres_data:
  redis_data:

networks:
  main-courante-network:
    driver: bridge
